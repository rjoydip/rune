name: Perf

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: perf-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  perf:
    name: Run Perf Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build packages
        run: bun run build

      - name: Run Perf Tests
        run: |
          cd perf
          bun run router.ts > /tmp/perf-router.txt 2>&1
          bun run event-bus.ts > /tmp/perf-event-bus.txt 2>&1
          bun run query-param.ts > /tmp/perf-query-param.txt 2>&1

      - name: Show Perf Results
        run: |
          echo "=== Router Benchmark ==="
          cat /tmp/perf-router.txt
          echo ""
          echo "=== Event Bus Benchmark ==="
          cat /tmp/perf-event-bus.txt
          echo ""
          echo "=== Query Param Benchmark ==="
          cat /tmp/perf-query-param.txt

      - name: Run Framework Benchmarks
        run: |
          cd benchmarks
          bun run runner.ts > /tmp/bench-results.txt 2>&1

      - name: Show Benchmark Results
        run: |
          cat /tmp/bench-results.txt

      - name: Create or Update PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const perfRouter = fs.readFileSync('/tmp/perf-router.txt', 'utf8').trim();
            const perfEventBus = fs.readFileSync('/tmp/perf-event-bus.txt', 'utf8').trim();
            const perfQueryParam = fs.readFileSync('/tmp/perf-query-param.txt', 'utf8').trim();
            const benchResults = fs.readFileSync('/tmp/bench-results.txt', 'utf8').trim();

            const cb = '```';
            const commentBody =
              '<!-- Perf Results -->\n' +
              '## :zap: Performance Results\n' +
              '\n' +
              '### Perf Tests\n' +
              '\n' +
              '**Router**\n' +
              cb + '\n' +
              perfRouter + '\n' +
              cb + '\n' +
              '\n' +
              '**Event Bus**\n' +
              cb + '\n' +
              perfEventBus + '\n' +
              cb + '\n' +
              '\n' +
              '**Query Param**\n' +
              cb + '\n' +
              perfQueryParam + '\n' +
              cb + '\n' +
              '\n' +
              '### Framework Benchmarks\n' +
              '\n' +
              cb + '\n' +
              benchResults + '\n' +
              cb + '\n' +
              '\n' +
              '---\n' +
              '_Updated at ' + new Date().toISOString() + ' by Perf CI_';

            const { context } = github;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('<!-- Perf Results -->')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
              console.log('Updated existing comment:', existingComment.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new comment');
            }

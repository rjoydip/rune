name: Benchmarks & Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "tools/rune-docs/**"
      - "benchmarks/**"
      - "packages/**"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.4.0"

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: bun run build

      - name: Run benchmarks and update docs
        run: bun run bench:update-docs
        working-directory: benchmarks

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks.md benchmarks/README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update benchmark results [skip ci]"
            git push
          fi

      - name: Install docs dependencies
        run: bun install --frozen-lockfile
        working-directory: tools/rune-docs

      - name: Build docs
        run: bun run build
        working-directory: tools/rune-docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy tools/rune-docs/dist --project-name=rune-docs

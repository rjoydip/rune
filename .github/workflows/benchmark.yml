name: Benchmark

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: bench-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bench:
    name: Run Benchmark Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build packages
        run: bun run build

      - name: Run Framework Benchmarks
        run: |
          cd benchmarks
          bun run runner.ts 2>&1 | tee /tmp/bench-results.txt

      - name: Show Benchmark Results
        run: |
          cat /tmp/bench-results.txt

      - name: Create or Update PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const benchResults = fs.readFileSync('/tmp/bench-results.txt', 'utf8').trim();

            const cb = '```';
            const commentBody =
              '<!-- Benchmark Results -->\n' +
              '## :zap: Benchmark Results\n' +
              '\n' +
              '### Framework Benchmarks\n' +
              '\n' +
              cb + '\n' +
              benchResults + '\n' +
              cb + '\n' +
              '\n' +
              '---\n' +
              '_Updated at ' + new Date().toISOString() + ' by Benchmark CI_';

            const { context } = github;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('<!-- Benchmark Results -->')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
              console.log('Updated existing comment:', existingComment.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
              console.log('Created new comment');
            }

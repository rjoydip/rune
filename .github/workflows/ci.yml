name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - run: bun install

      # Run tasks on affected projects only (PRs) or all projects (main)
      - run: bun nx affected -t build typecheck

      # Root-level tasks (run on the whole repo)
      - run: bun test
      - run: bunx oxlint packages

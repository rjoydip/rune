name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.6.0
        with:
          node-version: "22"

      - uses: denoland/setup-deno@c6b15a5847e2d300b12d6111b83c43a2f87d0d82 # v2.0.1
        with:
          deno-version: v2.x

      - run: bun install --ignore-scripts

      - run: bun run build

      # Root-level tasks (run on the whole repo)
      - run: bun test
      - run: bunx oxlint packages

name: Package Release Preview

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build
        run: bun run build

      - name: Publish preview
        run: |
          bun run pkg-pr-new publish --comment=update --commentWithSha --bun \
            './packages/adapters/*' \
            './packages/contracts/*' \
            './packages/foundation/core' \
            './packages/foundation/container' \
            './packages/foundation/config' \
            './packages/infrastructure/*' \
            './packages/runtime/*' \
            './packages/tooling/*'
